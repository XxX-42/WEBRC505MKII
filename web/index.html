<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RC-505MK2 Memory Reader</title>
    <link rel="stylesheet" href="style.css">
    <!-- Import standard sans-serif font and 8-bit Bitmap font -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1><span class="brand">BOSS</span> RC-505MK2 READER</h1>
            <div class="header-controls" style="display: flex; gap: 10px; align-items: center;">
                <div class="status-panel" id="statusPanel">
                    <span class="label">MEMORY:</span>
                    <span class="value" id="memoryName">--</span>
                </div>
                <button id="debugToggle" class="theme-toggle-btn active" style="color: var(--accent-red);"
                    title="Toggle Debug Mode">DEBUG</button>
                <button id="themeToggle" class="theme-toggle-btn">☀/☾</button>
            </div>
        </header>

        <main>
            <section class="upload-section">
                <div class="drop-zone" id="dropZone">
                    <p>DRAG & DROP .RC0 FILE HERE</p>
                    <p class="sub-text">OR CLICK TO UPLOAD</p>
                    <input type="file" id="fileInput" accept=".RC0,.rc0" hidden>
                </div>
            </section>

            <nav class="tabs" id="tabs" style="display: none;">
                <button class="tab-btn active" data-tab="tracks">TRACKS</button>
                <button class="tab-btn" data-tab="assigns">ASSIGNS</button>
                <button class="tab-btn" data-tab="effects">EFFECTS</button>
                <button class="tab-btn" data-tab="fx">Effects (CTL)</button>
                <button class="tab-btn" data-tab="input-track-fx">Input & Track FX</button>
                <button class="tab-btn" data-tab="system">SYSTEM</button>
            </nav>

            <section class="content-area" id="contentArea">
                <!-- Data will be injected here -->
                <div class="placeholder-text">Waiting for data...</div>
                <!-- Effects Tab -->
                <div id="pane-fx" class="tab-pane">
                    <div id="effectsList"></div>
                </div>

                <!-- Input & Track FX Tab -->
                <div id="pane-input-track-fx" class="tab-pane">
                    <div class="fx-container">
                        <div class="fx-column">
                            <h3>Input FX (A-D)</h3>
                            <div id="inputFxList"></div>
                        </div>
                        <div class="fx-column">
                            <h3>Track FX (A-D)</h3>
                            <div id="trackFxList"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>RC-505MK2 Web Parser &copy; 2026</p>
            <p>Created by <span style="color: var(--accent-red);">XxX-42</span> | <a
                    href="https://github.com/XxX-42/WEBRC505MKII" target="_blank"
                    style="color: var(--accent-green); text-decoration: none;">View on GitHub</a></p>
        </footer>
    </div>
    <script type="module" src="js/app.js"></script>
</body>

</html>
